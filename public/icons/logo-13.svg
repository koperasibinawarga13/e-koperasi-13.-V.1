
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Logo 13">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="72" fill="#071f3f" />

  <!-- Circular badge with gradient -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="176" fill="url(#g)" />
  </g>

  <!-- Stylized number 13 -->
  <g transform="translate(0,6)">
    <text x="50%" y="56%" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="220" fill="#071f3f">
      13
    </text>
    <text x="50%" y="56%" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="220" fill="rgba(255,255,255,0)" stroke="#071f3f" stroke-width="2" paint-order="stroke">
      13
    </text>
  </g>

</svg>
